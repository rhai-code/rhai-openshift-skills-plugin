replicaCount: 1

image:
  repository: quay.io/eformat/openshift-skills-plugin
  tag: latest
  pullPolicy: Always

plugin:
  name: openshift-skills-plugin
  displayName: "OpenShift Skills Plugin"
  port: 9443

serviceAccount:
  create: true
  name: skills-plugin

service:
  type: ClusterIP
  port: 9443

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 2Gi
  mountPath: /app/data

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

tls:
  enabled: true

enablePlugin: true
